name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.0'
  FLUTTER_CHANNEL: 'stable'

jobs:
  build-macos:
    name: Build macOS (arm64 + x64 + universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # Single source of truth: the `version` field in pubspec.yaml.
          # Strip any +build suffix; the release tag is v<version>.
          VERSION=$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//; s/\+.*//' | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - run: flutter pub get

      - name: Write .env from secrets
        shell: bash
        run: |
          cat > .env <<EOF
          TRANSFER_RTDB_URL=${{ secrets.TRANSFER_RTDB_URL }}
          TRANSFER_API_KEY=${{ secrets.TRANSFER_API_KEY }}
          EOF

      - name: Build macOS app (universal)
        run: flutter build macos --release

      - name: Verify universal binary
        run: |
          BIN="build/macos/Build/Products/Release/Notilus.app/Contents/MacOS/Notilus"
          file "$BIN"
          lipo -info "$BIN"
          lipo -info "$BIN" | grep -E 'arm64' && lipo -info "$BIN" | grep -E 'x86_64'

      - name: Package DMGs (universal, arm64, x64)
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          SRC="build/macos/Build/Products/Release/Notilus.app"

          thin_app() {
            local app="$1"
            local arch="$2"
            find "$app" -type f -print0 | while IFS= read -r -d '' f; do
              if file -b "$f" | grep -q "Mach-O.*universal"; then
                lipo "$f" -thin "$arch" -output "$f.tmp" && mv "$f.tmp" "$f"
              fi
            done
            # Re-sign ad-hoc since lipo invalidated signatures
            codesign --force --deep --sign - "$app"
          }

          package_dmg() {
            local flavor="$1"
            local arch="$2"   # empty = universal, no thinning
            local stage="dist/$flavor"
            local app_copy="$stage/Notilus.app"
            rm -rf "$stage"
            mkdir -p "$stage"
            cp -R "$SRC" "$app_copy"
            ln -s /Applications "$stage/Applications"

            if [ -n "$arch" ]; then
              echo "==> Thinning $flavor to $arch"
              thin_app "$app_copy" "$arch"
              echo "==> Verifying thinned main binary"
              lipo -info "$app_copy/Contents/MacOS/Notilus"
            fi

            hdiutil create \
              -volname "Notilus" \
              -srcfolder "$stage" \
              -ov -format UDZO \
              "Notilus-${VERSION}-macos-${flavor}.dmg"
          }

          package_dmg "universal" ""
          package_dmg "arm64"     "arm64"
          package_dmg "x64"       "x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: Notilus-*-macos-*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # Single source of truth: the `version` field in pubspec.yaml.
          # Strip any +build suffix; the release tag is v<version>.
          VERSION=$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//; s/\+.*//' | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - run: flutter pub get

      - name: Write .env from secrets
        shell: bash
        run: |
          cat > .env <<EOF
          TRANSFER_RTDB_URL=${{ secrets.TRANSFER_RTDB_URL }}
          TRANSFER_API_KEY=${{ secrets.TRANSFER_API_KEY }}
          EOF

      - name: Build Windows app
        # CMake 4.x on windows-latest removed support for
        # cmake_minimum_required(VERSION < 3.5). The pdfx plugin downloads
        # pdfium at configure time, whose bundled CMakeLists declares a
        # pre-3.5 minimum. The nested cmake sub-process inherits this env var
        # (CMAKE_POLICY_VERSION_MINIMUM, honored since CMake 3.31), so it
        # reaches the pdfium configure that a command-line -D flag would miss.
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: flutter build windows --release

      - name: Package zip
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $dest = "Notilus-$version-windows-x64.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $dest

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: Notilus-*-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libnotify-dev libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # Single source of truth: the `version` field in pubspec.yaml.
          # Strip any +build suffix; the release tag is v<version>.
          VERSION=$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//; s/\+.*//' | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - run: flutter pub get

      - name: Write .env from secrets
        shell: bash
        run: |
          cat > .env <<EOF
          TRANSFER_RTDB_URL=${{ secrets.TRANSFER_RTDB_URL }}
          TRANSFER_API_KEY=${{ secrets.TRANSFER_API_KEY }}
          EOF

      - name: Build Linux app
        run: flutter build linux --release

      - name: Stage desktop entry and icon
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          cp linux/packaging/notilus.desktop "$BUNDLE/notilus.desktop"
          cp assets/icon/icon.png "$BUNDLE/notilus.png"

      - name: Package tarball
        run: |
          tar -czf "Notilus-${{ steps.ver.outputs.version }}-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: Notilus-*-linux-x64.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: ver
        run: |
          # Single source of truth: the `version` field in pubspec.yaml.
          # Strip any +build suffix; the release tag is v<version>.
          VERSION=$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//; s/\+.*//' | tr -d '[:space:]')
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Notilus ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/macos/*.dmg
            artifacts/windows/*.zip
            artifacts/linux/*.tar.gz
